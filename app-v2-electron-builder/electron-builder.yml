# Identificatore unico dell'app
appId: com.sunnify.app 
# Nome mostrato all'utente
productName: SpotiDisk 
# if `true` the bundled app will use asar format (like a zip file)
# if `false` the bundled app will use plain files/folders
asar: false
# Copy directories to bundle
directories:
  buildResources: assets # Cartella per icone, screenshot
  output: dist # Dove mettere gli installer
# Copy files to bundle
files:
  # electron-main files
  - "node_modules/**" # node dep (production only deps - no devDependencies)
  - "package.json" # Metadati app
  - "dist-electron-main/**" # compiled electron main files
  - "config.json" # Metadati app
  # frontend-react files
  - from: ../app-v2/frontend-react/dist
    to: dist-frontend
    filter: 
      - "**/*"
  # backend-python
  - from: ../app-v2/backend-python
    to: dist-backend
    filter: 
      - "**/*"
      - "!**/.bin"

# Define MAC OS executable config
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
