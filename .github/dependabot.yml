# Keeps SHA pins + lockfiles fresh without manual work or email noise:
# grouped (one PR per ecosystem), monthly, 7-day cooldown so a compromised
# release (tj-actions pattern) gets caught upstream before a bump lands here.
#
# Two guardrails learned the hard way (see PRs #56/#57/#68 + the v2.0.14
# release failure):
# - lock-check.yml gates every change to requirements-build.txt with a
#   3-platform `pip install --require-hashes --dry-run`; dependabot's lock
#   regen dropped pyinstaller's platform-marker transitives (macholib/pefile)
#   in #70 and it only surfaced when the release build went red.
# - webclient framework majors (next/react/tailwind/eslint/ts) are hands-on
#   migrations, not bumps; grouped, they produce an unmergeable PR. Majors are
#   ignored; minor+patch still flow.

version: 2
updates:
  # note: cooldown is not supported for the github-actions ecosystem
  # (per the dependabot options reference); monthly cadence is the buffer.
  - package-ecosystem: "github-actions" # zizmor: ignore[dependabot-cooldown]
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/web-app/sunnify-backend"
    schedule:
      interval: "monthly"
    groups:
      python:
        patterns: ["*"]
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      hooks:
        patterns: ["*"]
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "npm"
    directory: "/web-app/sunnify-webclient"
    schedule:
      interval: "monthly"
    groups:
      webclient:
        patterns: ["*"]
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2
