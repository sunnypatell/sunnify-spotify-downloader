# Keeps SHA pins + lockfiles fresh without manual work or email noise:
# grouped (one PR per ecosystem), monthly, 7-day cooldown so a compromised
# release (tj-actions pattern) gets caught upstream before a bump lands here.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/web-app/sunnify-backend"
    schedule:
      interval: "monthly"
    groups:
      python:
        patterns: ["*"]
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2

  - package-ecosystem: "npm"
    directory: "/web-app/sunnify-webclient"
    schedule:
      interval: "monthly"
    groups:
      webclient:
        patterns: ["*"]
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 2
