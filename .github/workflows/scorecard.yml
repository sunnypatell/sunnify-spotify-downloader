# OpenSSF Scorecard: weekly supply-chain posture score -> README badge +
# Security tab. Set-and-forget; treated as a dashboard, not a target.
# publish_results forbids top-level env / workflow-level write perms /
# unapproved actions in this job - keep it minimal.

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "30 6 * * 1" # weekly on monday, after the codeql run
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write        # publish results (signed via OIDC)
      contents: read         # matches the official template

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
