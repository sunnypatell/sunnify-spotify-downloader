# OpenSSF Scorecard: weekly supply-chain posture score -> README badge +
# Security tab. Set-and-forget; treated as a dashboard, not a target.
# publish_results forbids top-level env / workflow-level write perms /
# unapproved actions in this job - keep it minimal.

name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "30 6 * * 1" # weekly on monday, after the codeql run
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write        # publish results (signed via OIDC)

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
