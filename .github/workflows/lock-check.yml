# =============================================================================
# Release Lock Check
# =============================================================================
# Proves requirements-build.txt still resolves under --require-hashes on all
# three release platforms whenever the lock or its inputs change. Exists
# because dependabot's lock regen (#70) dropped pyinstaller's platform-marker
# transitives and the breakage only surfaced when the v2.0.14 release build
# went red on macOS/Windows; this fails that class of edit at PR time.
# Python and pip flags mirror release-build.yml exactly.
# =============================================================================

name: Lock Check

on:
  pull_request:
    paths:
      - "requirements-build.txt"
      - "requirements-build.in"
      - "req.txt"
      - ".github/workflows/lock-check.yml"
  push:
    branches: [main]
    paths:
      - "requirements-build.txt"
      - "requirements-build.in"
      - "req.txt"
      - ".github/workflows/lock-check.yml"

permissions:
  contents: read

jobs:
  lock-check:
    name: Lock resolves (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel proves the lock resolves x86_64 macOS wheels too -
        # the Intel release build installs from this same lock.
        os: [ubuntu-latest, windows-latest, macos-14, macos-15-intel]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python (same version as release builds)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Resolve the hash lock without installing
        # runner pip as-is, mirroring release-build.yml (which never self-upgrades)
        shell: bash
        run: pip install --require-hashes --dry-run -r requirements-build.txt
