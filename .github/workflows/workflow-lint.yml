# Lints the CI itself on workflow changes: actionlint (correctness) +
# zizmor (security, SARIF to the Security tab). Both dependabot-tracked.

name: Workflow Lint

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
        with:
          # shellcheck piped through actionlint double-reports things ruff/
          # shfmt territory; keep the signal high.
          flags: "-ignore SC2086 -ignore SC2129"

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write # SARIF upload to the Security tab
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # min-severity medium: low/informational findings stay visible
          # locally (pre-commit) without failing CI - the trap-avoidance
          # tradeoff between signal and noise.
          min-severity: medium
