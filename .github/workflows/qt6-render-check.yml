# TEMPORARY: cross-os visual verification for the pyqt6 port (feat/qt6).
# Renders the main window + both toast cards offscreen on windows and linux
# and uploads PNGs for human review. Delete after the port merges.

name: Qt6 Render Check

on:
  push:
    branches: [feat/qt6]

permissions:
  contents: read

jobs:
  render:
    name: Render (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install linux qt runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libegl1 libgl1 fontconfig

      - name: Install app deps
        run: pip install -r req.txt

      - name: Render ui surfaces at 1x/1.5x/2x
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # windows offscreen ships an empty font database; point it at the
          # system fonts so text renders instead of tofu boxes
          if [ "$RUNNER_OS" = "Windows" ]; then export QT_QPA_FONTDIR="C:/Windows/Fonts"; fi
          mkdir -p renders
          cat > _render.py <<'EOF'
          import os, sys
          scale = os.environ.get("QT_SCALE_FACTOR", "1")
          from PyQt6.QtGui import QColor, QImage, QPainter
          from PyQt6.QtWidgets import QApplication
          app = QApplication(sys.argv)
          import Spotify_Downloader as sd

          def shot(widget, name, fixed=None):
              widget.show(); app.processEvents()
              # fixed-geometry surfaces (the 750x500 main window) must not be
              # adjustSize'd - absolute positioning gives a garbage sizeHint
              widget.resize(*fixed) if fixed else widget.adjustSize()
              app.processEvents()
              pm = widget.grab()
              img = QImage(pm.size(), QImage.Format.Format_ARGB32)
              img.fill(QColor("#ECECEC"))
              p = QPainter(img); p.drawPixmap(0, 0, pm); p.end()
              out = f"renders/{name}-{scale}x-{sys.platform}.png"
              img.save(out); print("saved", out, widget.width(), widget.height())

          win = sd.MainWindow(); shot(win, "main-window", fixed=(750, 500))
          shot(sd.StarPromptNotifier(win), "star-toast")
          shot(sd.UpdateNotifier(None, "2.0.15", "2.1.0", "u"), "update-notifier")
          app.quit()
          EOF
          for S in 1 1.5 2; do QT_SCALE_FACTOR=$S python _render.py; done

      - name: Upload renders
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qt6-renders-${{ matrix.os }}
          path: renders/
