name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # pyproject.toml declares `requires-python = ">=3.9"`, so we test
        # the full supported range. `from __future__ import annotations` is
        # the load-bearing import that keeps PEP 604 unions (`X | None`)
        # working on 3.9; this matrix would catch a regression if anyone
        # removes it.
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r req.txt -r requirements-dev.txt
          pip install pytest-mock

      - name: Run tests
        run: pytest tests/ -v --tb=short
